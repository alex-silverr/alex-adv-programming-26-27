services:
  app:
    build: .
    container_name: app
    tty: true
    # restart: always
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy
    
  db:
    image: postgres
    container_name: db
    restart: always
    environment:
      - POSTGRES_DB=db
      - POSTGRES_USER=usr
      - POSTGRES_PASSWORD=pwd
      - POSTGRES_PORT=5432
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "db_prod"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s